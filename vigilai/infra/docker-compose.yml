version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: vigilai
      POSTGRES_PASSWORD: vigilai
      POSTGRES_DB: vigilai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vigilai"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: ../infra/Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://vigilai:vigilai@postgres:5432/vigilai
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      JWT_SECRET: ${JWT_SECRET:-vigilai-dev-secret}
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 480
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../backend:/app
      - ../agents:/agents
      - ../ml:/ml
      - ../data:/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
